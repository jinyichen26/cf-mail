<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>优品商城</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .header {
            padding: 20px 40px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
            letter-spacing: 2px;
        }

        .container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .page-title {
            text-align: center;
            color: #fff;
            font-size: 36px;
            margin-bottom: 50px;
            font-weight: 600;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        .product-card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        .product-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background: #f5f5f5;
        }

        .product-info {
            padding: 24px;
        }

        .product-name {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }

        .product-price {
            font-size: 28px;
            font-weight: 700;
            color: #e74c3c;
            margin-bottom: 20px;
        }

        .product-price .symbol {
            font-size: 18px;
            margin-right: 2px;
        }

        .buy-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .buy-btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .buy-btn:active {
            transform: scale(0.98);
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .payment-panel {
            background: #fff;
            border-radius: 20px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            display: flex;
            position: relative;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .close-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #f0f0f0;
            border: none;
            cursor: pointer;
            font-size: 20px;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .close-btn:hover {
            background: #e0e0e0;
            color: #333;
        }

        .payment-left {
            flex: 1;
            padding: 40px;
            background: linear-gradient(135deg, #1677ff 0%, #0958d9 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px 0 0 20px;
        }

        .payment-left h3 {
            color: #fff;
            font-size: 22px;
            margin-bottom: 24px;
            font-weight: 600;
        }

        .qr-code {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .qr-code img {
            width: 200px;
            height: 200px;
            display: block;
        }

        .qr-tip {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            margin-top: 20px;
        }

        .payment-right {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .payment-right h3 {
            font-size: 24px;
            color: #333;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .order-summary {
            background: #f7f8fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            font-size: 15px;
        }

        .summary-item .label {
            color: #666;
        }

        .summary-item .value {
            color: #333;
            font-weight: 500;
        }

        .summary-item .price {
            color: #e74c3c;
            font-size: 20px;
            font-weight: 700;
        }

        .summary-divider {
            height: 1px;
            background: #e5e6eb;
            margin: 12px 0;
        }

        .order-info {
            margin-bottom: 24px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 14px;
            border-bottom: 1px solid #f0f0f0;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-item .label {
            color: #999;
        }

        .info-item .value {
            color: #333;
            font-family: 'Courier New', monospace;
        }

        .contact-info {
            padding: 16px;
            background: #e6f4ff;
            border-radius: 10px;
            border-left: 4px solid #1677ff;
        }

        .contact-info .label {
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
        }

        .contact-info .email {
            font-size: 15px;
            color: #1677ff;
            font-weight: 500;
        }

        @media (max-width: 900px) {
            .products {
                grid-template-columns: repeat(2, 1fr);
            }

            .payment-panel {
                flex-direction: column;
                max-width: 500px;
            }

            .payment-left {
                border-radius: 20px 20px 0 0;
                padding: 30px;
            }

            .payment-right {
                padding: 30px;
            }
        }

        @media (max-width: 600px) {
            .header {
                padding: 16px 20px;
            }

            .logo {
                font-size: 20px;
            }

            .page-title {
                font-size: 28px;
                margin-bottom: 30px;
            }

            .container {
                margin: 40px auto;
            }

            .products {
                grid-template-columns: 1fr;
            }

            .product-image {
                height: 220px;
            }

            .payment-panel {
                width: 95%;
            }

            .qr-code img {
                width: 160px;
                height: 160px;
            }

            .payment-left h3 {
                font-size: 18px;
            }

            .payment-right h3 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">优品商城</div>
    </header>

    <main class="container">
        <h1 class="page-title">精选好物</h1>
        <div class="products" id="products"></div>
    </main>

    <div class="overlay" id="overlay">
        <div class="payment-panel">
            <button class="close-btn" id="closeBtn">&times;</button>
            <div class="payment-left">
                <h3>支付宝收款码</h3>
                <div class="qr-code">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=alipay%3A%2F%2Fqr.alipay.com%2Fexample" alt="支付宝收款码">
                </div>
                <p class="qr-tip">请使用支付宝扫码支付</p>
            </div>
            <div class="payment-right">
                <h3>订单支付</h3>
                <div class="order-summary">
                    <div class="summary-item">
                        <span class="label" id="summaryName">商品名称</span>
                        <span class="value" id="summaryPrice">¥0</span>
                    </div>
                    <div class="summary-divider"></div>
                    <div class="summary-item">
                        <span class="label">应付金额</span>
                        <span class="price" id="totalPrice">¥0</span>
                    </div>
                </div>
                <div class="order-info">
                    <div class="info-item">
                        <span class="label">订单号</span>
                        <span class="value" id="orderNo">ORD0000000000</span>
                    </div>
                    <div class="info-item">
                        <span class="label">支付方式</span>
                        <span class="value">支付宝</span>
                    </div>
                </div>
                <div class="contact-info">
                    <div class="label">如有问题请联系</div>
                    <div class="email">contact@example.com</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const products = [
            {
                id: 1,
                name: '无线蓝牙耳机',
                price: 299,
                image: 'https://picsum.photos/seed/earphone/400/300'
            },
            {
                id: 2,
                name: '智能手表',
                price: 899,
                image: 'https://picsum.photos/seed/watch/400/300'
            },
            {
                id: 3,
                name: '便携充电宝',
                price: 159,
                image: 'https://picsum.photos/seed/powerbank/400/300'
            }
        ];

        const productsContainer = document.getElementById('products');
        const overlay = document.getElementById('overlay');
        const closeBtn = document.getElementById('closeBtn');
        const summaryName = document.getElementById('summaryName');
        const summaryPrice = document.getElementById('summaryPrice');
        const totalPrice = document.getElementById('totalPrice');
        const orderNo = document.getElementById('orderNo');

        function renderProducts() {
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${product.image}" alt="${product.name}" class="product-image">
                    <div class="product-info">
                        <h3 class="product-name">${product.name}</h3>
                        <div class="product-price"><span class="symbol">¥</span>${product.price}</div>
                        <button class="buy-btn" data-id="${product.id}">立即购买</button>
                    </div>
                `;
                productsContainer.appendChild(card);
            });
        }

        function generateOrderNo() {
            const timestamp = Date.now();
            const random = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
            return `ORD${timestamp}${random}`;
        }

        function openPayment(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;

            summaryName.textContent = product.name;
            summaryPrice.textContent = `¥${product.price}`;
            totalPrice.textContent = `¥${product.price}`;
            orderNo.textContent = generateOrderNo();

            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closePayment() {
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        productsContainer.addEventListener('click', (e) => {
            if (e.target.classList.contains('buy-btn')) {
                const productId = parseInt(e.target.dataset.id);
                openPayment(productId);
            }
        });

        closeBtn.addEventListener('click', closePayment);

        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) {
                closePayment();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && overlay.classList.contains('active')) {
                closePayment();
            }
        });

        renderProducts();
    </script>
</body>
</html>
